services:
  app:
    build:
      context: .
    image: nba-referee-analytics:latest
    container_name: nba-referee-analytics
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  db:
    image: postgres:16-alpine
    container_name: nba-referee-analytics-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nba_ref_app -d nba_ref_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
